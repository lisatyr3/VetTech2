<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vet Tech Mastery - Advanced Edition</title>
<style>
:root { --primary: #2563eb; --success: #16a34a; --error: #dc2626; --bg: #f8fafc; }
body { font-family: system-ui, sans-serif; background: var(--bg); max-width: 850px; margin: 20px auto; padding: 20px; }
.card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.btn { padding: 14px; margin: 8px 0; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
.btn-choice { background: #f1f5f9; text-align: left; font-weight: normal; border: 1px solid #e2e8f0; }
.btn-choice:hover:not(:disabled) { background: #e2e8f0; }
.btn-primary { background: var(--primary); color: white; }
.correct { background: #dcfce7 !important; border-color: var(--success); }
.wrong { background: #fee2e2 !important; border-color: var(--error); }
.progress-bar { height: 10px; background: #e2e8f0; margin-bottom: 20px; border-radius: 5px; }
#progressInner { height: 100%; width: 0%; background: var(--primary); transition: width 0.3s; }
#feedback { font-weight: bold; margin: 15px 0; padding: 10px; border-radius: 5px; }
.review-item { padding: 10px; border-bottom: 1px solid #eee; }
</style>
</head>
<body>

<div class="card">
    <div id="startMenu">
        <h1>🎓 Vet Tech Exam Prep</h1>
        <p>This update includes <b>Clinical Scenario</b> questions and <b>Reverse Logic</b> to test your deep understanding.</p>
        <button class="btn btn-choice" onclick="startQuiz('immune')">🦠 Immune System (Phagocytes & Organs)</button>
        <button class="btn btn-choice" onclick="startQuiz('skin')">🛡️ Integumentary (Layers & Pigment)</button>
        <button class="btn btn-choice" onclick="startQuiz('gi')">🧪 GI (Digestion & Ruminants)</button>
        <button class="btn btn-choice" onclick="startQuiz('urinary')">💧 Urinary (Nephrons & BP)</button>
        <button class="btn btn-primary" onclick="startQuiz('all')">🔥 THE GAUNTLET (All Mixed Questions)</button>
    </div>

    <div id="quizBox" style="display:none;">
        <div class="progress-bar"><div id="progressInner"></div></div>
        <div id="qCount" style="color: #64748b; font-weight: bold;"></div>
        <h3 id="questionText"></h3>
        <div id="optionsBox"></div>
        <div id="feedback"></div>
        <button id="nextBtn" class="btn btn-primary" style="display:none;">Next Question ➜</button>
    </div>

    <div id="resultBox" style="display:none;">
        <h2 id="scoreBig"></h2>
        <p id="scoreDetail"></p>
        <h3>Focus Areas (Missed):</h3>
        <div id="reviewList"></div>
        <button class="btn btn-primary" onclick="goHome()">🏠 Back to Menu</button>
    </div>
</div>

<script>
const bank = {
    immune: [
        { q: "A clinician finds a high count of 'Professional Phagocytes' in a wound. Which cell is LEAST likely to be part of this group?", a: ["Lymphocytes", "Monocytes", "Eosinophils", "Neutrophils"], c: 0 },
        { q: "If an animal cannot produce Complement proteins, which immune process is most directly compromised?", a: ["Opsonization and Cell Lysis", "Production of T-cells", "Vitamin D synthesis", "Red pulp storage"], c: 0 },
        { q: "Which organ acts as the 'Primary Filter' for lymph traveling from tissues back to the heart?", a: ["Lymph nodes", "Spleen", "Thymus", "Liver"], c: 0 },
        { q: "Scenario: An aging dog has trouble filtering old RBCs. Which organ is likely malfunctioning?", a: ["Spleen", "Small intestine", "Bone marrow", "Pancreas"], c: 0 },
        { q: "Which of these cytokines is responsible for the 'Chemical Trail' (Chemotaxis) that leads WBCs to a wound?", a: ["Chemokines", "Interferons", "Interleukins", "Complement"], c: 0 },
        { q: "A cat is having a severe allergic reaction (Type I Hypersensitivity). Which cell/antibody pair is driving this?", a: ["Mast Cell / IgE", "Neutrophil / IgM", "Plasma Cell / IgG", "Macrophage / IgA"], c: 0 },
        { q: "Identify the organ: It contains white pulp for immune defense and red pulp for blood storage.", a: ["Spleen", "Thymus", "Lymph node", "Bursa Fabricius"], c: 0 }
    ],
    skin: [
        { q: "Clinical Note: A technician needs to dehorn a calf. Which specific structure must be removed to prevent any horn tissue from returning?", a: ["Horn Bud / Corium", "Keratin Layer", "Frontal Sinus", "Periosteum"], c: 0 },
        { q: "Reverse Logic: Which is NOT a primary function of the skin?", a: ["Support of internal skeletal posture", "Vitamin D synthesis", "Prevention of desiccation", "Maintenance of body temperature"], c: 0 },
        { q: "Which layer is known as the 'Thickest' part of the skin and contains the most nerves/vessels?", a: ["Dermis", "Epidermis", "Hypodermis", "Stratum Corneum"], c: 0 },
        { q: "If a horse has a reddish-yellow coat, which pigment is predominating?", a: ["Phaeomelanin", "Eumelanin", "Keratin", "Lanolin"], c: 0 },
        { q: "The 'Waterproof Seal' of the mammalian skin is primarily provided by secretions from which gland?", a: ["Sebaceous gland", "Sweat gland", "Anal gland", "Uropygial gland"], c: 0 }
    ],
    gi: [
        { q: "Which structure connects the Pharynx to the Stomach, acting as the primary food transport tube?", a: ["Esophagus", "Duodenum", "Jejunum", "Trachea"], c: 0 },
        { q: "Reverse Logic: In the Rumen, which of these is NOT a function of the resident microbes?", a: ["Production of Hydrochloric Acid", "Production of VFAs", "Mixing of content", "Regurgitation of cud"], c: 0 },
        { q: "In poultry, if mechanical grinding of food is failing, which organ is likely affected?", a: ["Gizzard (Ventriculus)", "Proventriculus", "Crop", "Cecum"], c: 0 },
        { q: "The 'True Stomach' of a ruminant, where glandular digestion occurs, is the:", a: ["Abomasum", "Rumen", "Reticulum", "Omasum"], c: 0 },
        { q: "An animal that performs coprophagy (eating feces) to regain B-vitamins and protein is likely a:", a: ["Hindgut fermenter (like a Rabbit)", "Ruminant (like a Cow)", "Obligate Carnivore", "Omnivore"], c: 0 }
    ],
    urinary: [
        { q: "The Glomerular Filtration Rate (GFR) measures:", a: ["Amount of blood filtered by kidneys over time", "The percentage of sodium in urine", "The rate of ADH release", "The toxic level of ammonia"], c: 0 },
        { q: "Which 'Osmotic Hitchhiker' do Glucose and Amino Acids use to get reabsorbed into the blood?", a: ["Sodium", "Potassium", "Chloride", "Calcium"], c: 0 },
        { q: "If a kidney is failing to stimulate RBC production, it is likely not producing enough:", a: ["Erythropoietin (EPO)", "Renin", "ADH", "Aldosterone"], c: 0 },
        { q: "Scenario: A reptile lacks this nephron structure, making it harder for them to concentrate urine compared to mammals:", a: ["Loop of Henle", "Glomerulus", "PCT", "DCT"], c: 0 },
        { q: "Which hormone acts on the DCT to 'Save Sodium' (reabsorption)?", a: ["Aldosterone", "ADH", "Insulin", "Bicarbonate"], c: 0 }
    ]
};

let currentSet = [];
let qIdx = 0;
let score = 0;
let missed = [];

function startQuiz(cat) {
    qIdx = 0; score = 0; missed = [];
    if(cat === 'all') currentSet = [...bank.immune, ...bank.skin, ...bank.gi, ...bank.urinary];
    else currentSet = [...bank[cat]];
    
    currentSet.sort(() => Math.random() - 0.5);
    document.getElementById("startMenu").style.display = "none";
    document.getElementById("quizBox").style.display = "block";
    document.getElementById("resultBox").style.display = "none";
    showQuestion();
}

function showQuestion() {
    const q = currentSet[qIdx];
    const box = document.getElementById("optionsBox");
    document.getElementById("qCount").textContent = `QUESTION ${qIdx + 1} / ${currentSet.length}`;
    document.getElementById("progressInner").style.width = `${(qIdx / currentSet.length) * 100}%`;
    document.getElementById("questionText").textContent = q.q;
    document.getElementById("feedback").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    box.innerHTML = "";

    let opts = q.a.map((t, i) => ({ t, isCorrect: i === q.c }));
    opts.sort(() => Math.random() - 0.5);

    opts.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "btn btn-choice";
        btn.textContent = opt.t;
        btn.onclick = () => {
            const all = box.querySelectorAll(".btn");
            all.forEach(b => b.disabled = true);
            if(opt.isCorrect) {
                score++;
                btn.classList.add("correct");
                document.getElementById("feedback").textContent = "🎯 Exact! Great reasoning.";
                document.getElementById("feedback").className = "correct";
            } else {
                btn.classList.add("wrong");
                missed.push({ q: q.q, a: q.a[q.c] });
                document.getElementById("feedback").textContent = `⚠️ Careful! The correct answer is: ${q.a[q.c]}`;
                document.getElementById("feedback").className = "wrong";
                all.forEach(b => { if(b.textContent === q.a[q.c]) b.classList.add("correct"); });
            }
            document.getElementById("feedback").style.display = "block";
            document.getElementById("nextBtn").style.display = "block";
        };
        box.appendChild(btn);
    });
}

document.getElementById("nextBtn").onclick = () => {
    qIdx++;
    if(qIdx < currentSet.length) showQuestion();
    else showResults();
};

function showResults() {
    document.getElementById("quizBox").style.display = "none";
    document.getElementById("resultBox").style.display = "block";
    const pct = Math.round((score/currentSet.length)*100);
    document.getElementById("scoreBig").textContent = `${pct}% - ${pct >= 80 ? 'Vet Tech Pro! 🐾' : 'Keep Studying! 📖'}`;
    const list = document.getElementById("reviewList");
    list.innerHTML = missed.length === 0 ? "Perfect! You master these concepts." : "";
    missed.forEach(m => {
        const d = document.createElement("div");
        d.className = "review-item";
        d.innerHTML = `<b>Q:</b> ${m.q}<br><b style="color:var(--success)">Correct A:</b> ${m.a}`;
        list.appendChild(d);
    });
}

function goHome() {
    document.getElementById("resultBox").style.display = "none";
    document.getElementById("startMenu").style.display = "block";
}
</script>
</body>
</html>
