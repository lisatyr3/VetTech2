<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vet Tech Mastery</title>

<style>
body { font-family: system-ui; max-width: 800px; margin: 40px auto; }
.btn { padding: 12px; margin: 6px 0; width: 100%; cursor: pointer; }
.correct { background: #c8f7c5; }
.wrong { background: #f7c5c5; }
.selected { background: #dbeafe; }
</style>
</head>

<body>

<h2>Select Topic</h2>
<button onclick="startQuiz('skin')">Skin</button>
<button onclick="startQuiz('gi')">GI</button>
<button onclick="startQuiz('immune')">Immune</button>
<button onclick="startQuiz('all')">FINAL EXAM</button>

<hr>

<div id="quizBox" style="display:none;">
<h3 id="qText"></h3>
<div id="answers"></div>
<p id="feedback"></p>
<button onclick="nextQ()">Next</button>
<button onclick="goHome()">Home</button>
</div>

<div id="resultBox" style="display:none;">
<h2 id="score"></h2>
<button onclick="goHome()">Home</button>
</div>

<script>
const bank = {

immune: [
{type:"mc",q:"Which cell does NOT phagocytize?",a:["Lymphocytes","Monocytes","Eosinophils","Neutrophils"],c:0},
{type:"mc",q:"Complement proteins are:",a:["Always in plasma","Only in cells","Hormones","Enzymes"],c:0},
{type:"multi",q:"Select cytokines:",a:["Interferon","Chemokines","Complement","Interleukins"],c:[0,1,3]},
{type:"tf",q:"Lymph nodes filter lymph.",a:["True","False"],c:0},
{type:"mc",q:"Removes old RBCs:",a:["Liver","Spleen","Kidney","Heart"],c:1},
{type:"mc",q:"T cell development organ:",a:["Thymus","Bone marrow","Liver","Spleen"],c:0},
{type:"mc",q:"B cell development:",a:["Bone marrow","Thymus","Spleen","Nodes"],c:0},
{type:"mc",q:"White/red pulp organ:",a:["Spleen","Node","Liver","Thymus"],c:0},
{type:"mc",q:"Physical barrier:",a:["Skin","Complement","Inflammation","Nodes"],c:0},
{type:"mc",q:"Chemokines do:",a:["Attract WBC","Kill bacteria","Clot blood","Produce antibodies"],c:0},
{type:"mc",q:"Opsonization:",a:["Tag pathogens","Kill directly","Make antibodies","Clot blood"],c:0},
{type:"mc",q:"Humoral immunity cell:",a:["Plasma cell","T cell","NK cell","Platelet"],c:0},
{type:"mc",q:"Helper T cells:",a:["Coordinate response","Kill cells","Make antibodies","Clot"],c:0},
{type:"mc",q:"Largest WBC:",a:["Monocyte","Neutrophil","Lymphocyte","Basophil"],c:0}
],

skin: [
{type:"tf",q:"Only 2 genes control coat.",a:["True","False"],c:1},
{type:"multi",q:"Shedding factors:",a:["Hormones","Genetics","Environment","None"],c:[0,1,2]},
{type:"mc",q:"Claws purpose:",a:["Hunting/defense","Walking","Cooling","Digestion"],c:0},
{type:"mc",q:"Dermis contains:",a:["Blood vessels","Hair","Muscle","All"],c:3},
{type:"mc",q:"Black pigment:",a:["Eumelanin","Phaeomelanin","Melanin","Keratin"],c:0},
{type:"mc",q:"Animal with spurs:",a:["Chicken","Dog","Cat","Horse"],c:0},
{type:"multi",q:"Hair color purposes:",a:["Camouflage","Thermoregulation","Sex","Damage"],c:[0,1,2]},
{type:"mc",q:"Horn purpose:",a:["Competition","Walking","Digestion","Cooling"],c:0},
{type:"mc",q:"Keratinizing layer:",a:["Granulosum","Corneum","Dermis","Basale"],c:0},
{type:"mc",q:"Dermis tissue:",a:["Connective","Muscle","Epithelial","Bone"],c:0},
{type:"mc",q:"Waterproofing:",a:["Keratin","Mucin","GAG","Omentum"],c:0},
{type:"mc",q:"Sebaceous glands:",a:["Waterproof","Cool","Digest","Absorb"],c:0},
{type:"mc",q:"Hooves function:",a:["Walking surface","Defense","Cooling","Digestion"],c:0},
{type:"multi",q:"Skin functions:",a:["Vitamin D","Protection","Temp control","All"],c:[0,1,2]},
{type:"mc",q:"Thickest layer:",a:["Dermis","Epidermis","Hypodermis","Muscle"],c:0},
{type:"mc",q:"Major epidermal cell:",a:["Keratinocyte","Melanocyte","Merkel","Langerhans"],c:0},
{type:"mc",q:"Hypodermis:",a:["Fat/connective","Muscle","Bone","Epithelial"],c:0},
{type:"tf",q:"Skin bacteria mostly harmless.",a:["True","False"],c:0},
{type:"mc",q:"UV protection:",a:["Melanin","Keratin","Sweat","Lanolin"],c:0},
{type:"mc",q:"Dendritic cells:",a:["Langerhans","Keratinocyte","Melanocyte","Merkel"],c:0}
],

gi: [
{type:"mc",q:"Intestinal cell:",a:["Enterocyte","Hepatocyte","Monocyte","Osteocyte"],c:0},
{type:"mc",q:"Lubrication organ:",a:["Salivary glands","Stomach","Colon","Pancreas"],c:0},
{type:"mc",q:"Chemical digestion:",a:["Enzymatic breakdown","Chewing","Mixing","Absorption"],c:0},
{type:"mc",q:"Stores feces:",a:["Rectum","Colon","Cecum","Anus"],c:0},
{type:"mc",q:"Enzyme cells:",a:["Enterocytes","Goblet","Endocrine","Exocrine"],c:0},
{type:"mc",q:"Liver function:",a:["Clotting proteins","RBC production","Digestion","Absorption"],c:0},
{type:"mc",q:"Blind pouch:",a:["Cecum","Ileum","Colon","Rectum"],c:0},
{type:"mc",q:"Mechanical digestion starts:",a:["Mouth","Stomach","Colon","Small intestine"],c:0},
{type:"mc",q:"Pancreas enzymes:",a:["Exocrine","Endocrine","Neural","Hormonal"],c:0},
{type:"mc",q:"Absorption cells:",a:["Enterocytes","Goblet","Endocrine","Exocrine"],c:0},
{type:"mc",q:"Rumen fermentation:",a:["Rumen","Colon","Cecum","Stomach"],c:0},
{type:"mc",q:"HCl stimulation:",a:["ACh gastrin histamine","CCK","Secretin","Insulin"],c:0},
{type:"mc",q:"Sound organ:",a:["Larynx","Tongue","Teeth","Pharynx"],c:0},
{type:"mc",q:"Not GI function:",a:["Filter toxins","Digestion","Mastication","Prehension"],c:0},
{type:"mc",q:"After stomach:",a:["Duodenum","Ileum","Colon","Rectum"],c:0},
{type:"mc",q:"Mucus cells:",a:["Protect stomach","Digest","Absorb","Clot"],c:0},
{type:"mc",q:"Hindgut fermenter:",a:["Horse","Dog","Cat","Cow"],c:0},
{type:"mc",q:"Ghrelin:",a:["Hunger","Insulin","Digestion","Sleep"],c:0},
{type:"mc",q:"Mucosa:",a:["Epithelium","Muscle","Fat","Bone"],c:0},
{type:"mc",q:"Poultry stomach:",a:["Proventriculus","Gizzard","Crop","Cecum"],c:0}
]

};

let current = [], i=0, score=0, selected=[];

function startQuiz(cat){
i=0;score=0;
current = cat==="all" ? [...bank.skin,...bank.gi,...bank.immune] : [...bank[cat]];
current.sort(()=>Math.random()-0.5);
document.getElementById("quizBox").style.display="block";
showQ();
}

function showQ(){
const q=current[i];
const box=document.getElementById("answers");
box.innerHTML="";
selected=[];
document.getElementById("qText").innerText=q.q;
document.getElementById("feedback").innerText="";

q.a.forEach((t,idx)=>{
let b=document.createElement("button");
b.className="btn";
b.innerText=t;

b.onclick=()=>{
if(q.type==="multi"){
b.classList.toggle("selected");
if(selected.includes(idx)) selected=selected.filter(x=>x!==idx);
else selected.push(idx);
}else{
box.querySelectorAll("button").forEach(x=>x.disabled=true);
if(idx===q.c){b.classList.add("correct");score++;}
else b.classList.add("wrong");
}
};
box.appendChild(b);
});
}

function nextQ(){
const q=current[i];

if(q.type==="multi"){
if(JSON.stringify(selected.sort())===JSON.stringify(q.c.sort())) score++;
}

i++;
if(i<current.length) showQ();
else {
document.getElementById("quizBox").style.display="none";
document.getElementById("resultBox").style.display="block";
document.getElementById("score").innerText="Score: "+score+"/"+current.length;
}
}

function goHome(){
location.reload();
}
</script>

</body>
</html>
