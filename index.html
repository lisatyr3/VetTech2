<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vet Tech: Unit 2 Mastery</title>

<style>
:root {
  --primary: #2563eb;
  --success: #16a34a;
  --error: #dc2626;
  --bg: #f8fafc;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: #1e293b;
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 32px;
  border: 1px solid #e2e8f0;
}

h1 { font-size: 1.8rem; }

.btn {
  padding: 12px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  width: 100%;
  margin: 8px 0;
}

.btn-choice {
  background: #f1f5f9;
  border: 2px solid #f1f5f9;
  text-align: left;
}

.btn-choice:hover { background: #e2e8f0; }

.btn-primary {
  background: var(--primary);
  color: white;
}

.correct {
  background: #dcfce7 !important;
  border-color: var(--success) !important;
}

.wrong {
  background: #fee2e2 !important;
  border-color: var(--error) !important;
}

.hidden { display: none; }

.progress-bar {
  height: 8px;
  background: #e2e8f0;
  border-radius: 4px;
  margin-bottom: 20px;
}

#progressInner {
  height: 100%;
  background: var(--primary);
  width: 0%;
}

#feedback {
  margin-top: 12px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
  <h1>Vet Tech Mastery</h1>

  <div id="startMenu">
    <h3>Select Exam Topic:</h3>
    <button class="btn btn-choice" onclick="startQuiz('skin')">Skin</button>
    <button class="btn btn-choice" onclick="startQuiz('gi')">GI</button>
    <button class="btn btn-choice" onclick="startQuiz('immune')">Immune</button>
    <button class="btn btn-primary" onclick="startQuiz('all')">FINAL EXAM</button>
  </div>

  <div id="quizBox" class="hidden">
    <div class="progress-bar"><div id="progressInner"></div></div>
    <div id="qCount"></div>
    <h2 id="questionText"></h2>
    <div id="optionsBox"></div>
    <div id="feedback"></div>
    <button id="nextBtn" class="btn btn-primary" onclick="handleNext()" disabled>Next</button>
  </div>

  <div id="resultBox" class="hidden">
    <h2 id="scoreBig"></h2>
    <p id="scoreDetail"></p>
    <button class="btn btn-primary" onclick="location.reload()">Restart</button>
  </div>
</div>

<script>
const bank = {
  skin: [
    { q: "Vitamin D synthesis occurs where?", a: ["Skin", "Liver", "Kidney", "Heart"], c: 0 },
    { q: "Keratin structures include?", a: ["Horns", "Blood vessels", "Nerves", "Fat"], c: 0 }
  ],
  gi: [
    { q: "Na/K pump ratio?", a: ["3 Na out / 2 K in", "2/3", "1/1", "Reverse"], c: 0 },
    { q: "Obligate carnivore?", a: ["Cat", "Dog", "Horse", "Pig"], c: 0 }
  ],
  immune: [
    { q: "First responder cell?", a: ["Neutrophil", "RBC", "Platelet", "Neuron"], c: 0 },
    { q: "First antibody?", a: ["IgM", "IgG", "IgE", "IgA"], c: 0 }
  ]
};

let currentSet = [];
let qIdx = 0;
let score = 0;

function startQuiz(cat) {
  qIdx = 0;
  score = 0;

  if (cat === 'all') {
    currentSet = [...bank.skin, ...bank.gi, ...bank.immune];
  } else {
    currentSet = [...bank[cat]];
  }

  currentSet.sort(() => Math.random() - 0.5);

  document.getElementById('startMenu').classList.add('hidden');
  document.getElementById('quizBox').classList.remove('hidden');

  showQuestion();
}

function showQuestion() {
  const q = currentSet[qIdx];

  document.getElementById('qCount').textContent =
    `Question ${qIdx + 1} of ${currentSet.length}`;

  document.getElementById('progressInner').style.width =
    `${(qIdx / currentSet.length) * 100}%`;

  document.getElementById('questionText').textContent = q.q;

  const box = document.getElementById('optionsBox');
  box.innerHTML = '';

  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').disabled = true;

  let opts = q.a.map((t, i) => ({ t, correct: i === q.c }));
  opts.sort(() => Math.random() - 0.5);

  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-choice';
    btn.textContent = opt.t;

    btn.onclick = () => checkAns(opt.correct, btn, q.a[q.c]);

    box.appendChild(btn);
  });
}

function checkAns(isCorrect, btn, correctText) {
  const allBtns = document.querySelectorAll('.btn-choice');

  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correctText) {
      b.classList.add('correct');
    }
  });

  if (isCorrect) {
    score++;
    document.getElementById('feedback').textContent = "✅ Correct!";
    document.getElementById('feedback').style.color = "green";
  } else {
    btn.classList.add('wrong');
    document.getElementById('feedback').textContent = "❌ Incorrect";
    document.getElementById('feedback').style.color = "red";
  }

  document.getElementById('nextBtn').disabled = false;
}

function handleNext() {
  qIdx++;

  if (qIdx < currentSet.length) {
    showQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  document.getElementById('quizBox').classList.add('hidden');
  document.getElementById('resultBox').classList.remove('hidden');

  document.getElementById('progressInner').style.width = "100%";

  const pct = Math.round((score / currentSet.length) * 100);

  document.getElementById('scoreBig').textContent = pct + "%";
  document.getElementById('scoreDetail').textContent =
    `You got ${score} out of ${currentSet.length}`;
}
</script>

</body>
</html>
