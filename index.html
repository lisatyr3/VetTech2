<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vet Tech Mastery - The Full Exam</title>
<style>
:root { --primary: #2563eb; --success: #16a34a; --error: #dc2626; --bg: #f8fafc; }
body { font-family: system-ui, sans-serif; background: var(--bg); max-width: 850px; margin: 20px auto; padding: 20px; line-height: 1.4; }
.card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.btn { padding: 14px; margin: 8px 0; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
.btn-choice { background: #f1f5f9; text-align: left; font-weight: normal; border: 1px solid #e2e8f0; }
.btn-choice:hover:not(:disabled) { background: #e2e8f0; }
.btn-primary { background: var(--primary); color: white; }
.correct { background: #dcfce7 !important; border-color: var(--success); }
.wrong { background: #fee2e2 !important; border-color: var(--error); }
.progress-bar { height: 10px; background: #e2e8f0; margin-bottom: 20px; border-radius: 5px; overflow: hidden; }
#progressInner { height: 100%; width: 0%; background: var(--primary); transition: width 0.3s; }
#feedback { font-weight: bold; margin: 15px 0; padding: 15px; border-radius: 8px; display: none; }
.review-item { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9em; }
</style>
</head>
<body>

<div class="card">
    <div id="startMenu">
        <h1>🎓 Vet Tech Exam: The Full Set</h1>
        <p>I have combined the <b>80+ original questions</b> with <b>clinical reasoning</b> questions to test your mastery from every angle.</p>
        <button class="btn btn-choice" onclick="startQuiz('immune')">🦠 Immune System (25 Questions)</button>
        <button class="btn btn-choice" onclick="startQuiz('skin')">🛡️ Integumentary (25 Questions)</button>
        <button class="btn btn-choice" onclick="startQuiz('gi')">🧪 Gastrointestinal (39 Questions)</button>
        <button class="btn btn-choice" onclick="startQuiz('urinary')">💧 Urinary System (28 Questions)</button>
        <button class="btn btn-primary" onclick="startQuiz('all')">🔥 THE FINAL EXAM (All Topics Combined)</button>
    </div>

    <div id="quizBox" style="display:none;">
        <div class="progress-bar"><div id="progressInner"></div></div>
        <div id="qCount" style="color: #64748b; font-size: 0.85em; font-weight: bold; margin-bottom: 5px;"></div>
        <h3 id="questionText"></h3>
        <div id="optionsBox"></div>
        <div id="feedback"></div>
        <button id="nextBtn" class="btn btn-primary" style="display:none;">Next Question ➜</button>
    </div>

    <div id="resultBox" style="display:none;">
        <h2 id="scoreBig"></h2>
        <p id="scoreDetail"></p>
        <div id="reviewContainer">
            <h3>Review Missed Items:</h3>
            <div id="reviewList"></div>
        </div>
        <button class="btn btn-primary" onclick="goHome()">🏠 Back to Main Menu</button>
    </div>
</div>

<script>
const bank = {
    immune: [
        { q: "Which cell does NOT phagocytize foreign microbes or material?", a: ["Lymphocytes", "Monocytes", "Eosinophils", "Neutrophils"], c: 0 },
        { q: "Which proteins are always in the plasma waiting to be activated by antigens?", a: ["Complement", "Cytokines", "Natural killer cells", "Inflammation"], c: 0 },
        { q: "What organ contains macrophages that are especially active in removing aging/dead RBCs?", a: ["Spleen", "Liver", "Small intestine", "Large intestine"], c: 0 },
        { q: "Which organ is critical to the development of T cells in mammals?", a: ["Thymus", "Spleen", "Bursa Fabricius", "Bone marrow"], c: 0 },
        { q: "Which leukocyte is activated when an antigen binds to IgE, inducing an inflammatory response?", a: ["Mast cell", "Neutrophil", "Eosinophil", "Macrophage"], c: 0 },
        { q: "Which organ contains white pulp (lymphoid tissue) and red pulp (blood storage)?", a: ["Spleen", "Thymus", "Lymph nodes", "Bone marrow"], c: 0 },
        { q: "Which organ is critical to the development of B cells in mammals?", a: ["Bone marrow", "Bursa Fabricius", "Spleen", "Thymus"], c: 0 },
        { q: "Which is a physical barrier acting as the first line of defense?", a: ["Skin", "Inflammation", "Tonsils", "Complement"], c: 0 },
        { q: "The process of attracting WBCs to an area of inflammation or invasion is:", a: ["Chemotaxis", "Diapedesis", "Opsonization", "Degranulation"], c: 0 },
        { q: "What is the process of coating microorganisms with factors to mark them for destruction?", a: ["Opsonization", "Degranulation", "Diapedesis", "Chemotaxis"], c: 0 },
        { q: "Which cell is the primary component of humoral immunity?", a: ["Plasma cell", "Helper T cell", "Regulatory T cell", "Natural killer cell"], c: 0 },
        { q: "The lymph nodes located behind the knee (stifle joint) are called:", a: ["Popliteal", "Inguinal", "Submandibular", "Prescapular"], c: 0 },
        { q: "Which lymph node is frequently enlarged because of poor dental hygiene?", a: ["Submandibular", "Axillary", "Inguinal", "Prescapular"], c: 0 },
        { q: "What are the aggregations of lymphoid tissue in the small intestine called?", a: ["Peyer's patches", "Tonsils", "Thymus", "MALT"], c: 0 },
        { q: "The process of squeezing between endothelial cells to leave blood vessels is:", a: ["Diapedesis", "Chemotaxis", "Opsonization", "Degranulation"], c: 0 }
    ],
    skin: [
        { q: "Which pigment produces black and brown colorations in animals?", a: ["Eumelanin", "Agouti melanin", "Phaeomelanin", "Melanocortin"], c: 0 },
        { q: "Which animal has spurs?", a: ["Chickens", "Dogs", "Cats", "Cattle"], c: 0 },
        { q: "In which layer do cells fill with keratohyaline leading to cell death?", a: ["Stratum granulosum", "Papillary layer", "Stratum corneum", "Stratum germinativum"], c: 0 },
        { q: "The dermis consists mostly of which type of tissue?", a: ["Connective tissue (collagen and elastin)", "Muscle tissue", "Epithelial tissue", "Adipose tissue"], c: 0 },
        { q: "Which substance provides the waterproof quality to skin?", a: ["Keratin", "Omentum", "Mucin", "Glycosaminoglycans"], c: 0 },
        { q: "What are the secondary sexual appendages of roosters called?", a: ["Comb and wattle", "Wattle and snood", "Comb and snood", "Snood and spurs"], c: 0 },
        { q: "Which gland provides waterproofing for mammalian skin?", a: ["Sebaceous gland", "Anal gland", "Sweat gland", "Uropygial gland"], c: 0 },
        { q: "When dehorning, which structure must be destroyed to prevent growth?", a: ["Corium", "Periosteum", "Keratin", "Horn bud"], c: 0 },
        { q: "Which is the thickest layer of the skin?", a: ["Dermis", "Epidermis", "Hypodermis", "Muscle"], c: 0 },
        { q: "The hypodermis consists mostly of which tissue type?", a: ["Connective tissue with lots of adipose", "Epithelial tissue", "Muscle", "Collagen only"], c: 0 },
        { q: "In adult horned animals, the horn communicates directly with which sinus?", a: ["Frontal sinus", "Nasal sinus", "Maxillary sinus", "Nasomaxillary sinus"], c: 0 },
        { q: "Which cells are dendritic cells in the epidermis?", a: ["Langerhans cells", "Keratinocytes", "Melanocytes", "Merkel cells"], c: 0 },
        { q: "Which pigment produces red and yellow colorations?", a: ["Phaeomelanin", "Eumelanin", "Melanocortin", "Agouti melanin"], c: 0 }
    ],
    gi: [
        { q: "Which cell lines the intestinal tract?", a: ["Enterocyte", "Hepatocyte", "Osteocyte", "Monocyte"], c: 0 },
        { q: "Which structure stores feces until defecation?", a: ["Rectum", "Colon", "Cecum", "Anus"], c: 0 },
        { q: "Which structure is a blind pouch and part of the large intestine?", a: ["Cecum", "Ileum", "Crop", "Gizzard"], c: 0 },
        { q: "Where does the majority of microbial fermentation occur in ruminants?", a: ["Rumen", "Cecum", "Reticulum", "Omasum"], c: 0 },
        { q: "Which molecules increase the release of HCl in the stomach?", a: ["Acetylcholine, gastrin, and histamine", "Histamine and prostaglandins", "Cholecystokinin and secretin", "Gastrin and somatostatin"], c: 0 },
        { q: "Which structure is after the stomach and before the jejunum?", a: ["Duodenum", "Ileum", "Esophagus", "Cecum"], c: 0 },
        { q: "Which animals are hindgut fermenters (large cecum)?", a: ["Horses and rabbits", "Dogs and pigs", "Cats and cows", "Sheep and goats"], c: 0 },
        { q: "Which structure is the glandular stomach of poultry?", a: ["Proventriculus", "Crop", "Gizzard", "Cecum"], c: 0 },
        { q: "Where and how are volatile fatty acids (VFAs) produced in ruminants?", a: ["Rumen by microbes", "Abomasum by microbes", "Omasum by parietal cells", "Reticulum by gastric cells"], c: 0 },
        { q: "Which animal is coprophagic as part of its regular digestive system?", a: ["Rabbits", "Cats", "Horses", "Dogs"], c: 0 },
        { q: "What is the movement that propels contents through the intestines?", a: ["Peristalsis", "Segmentation", "Eructation", "Rumination"], c: 0 },
        { q: "Where does bilirubin come from?", a: ["Breakdown of heme/hemoglobin", "Breakdown of WBCs", "Produced by the pancreas", "Absorbed from diet"], c: 0 }
    ],
    urinary: [
        { q: "What does the sodium-potassium pump do?", a: ["Moves sodium out and potassium in", "Moves both out", "Moves potassium out and sodium in", "Moves both in"], c: 0 },
        { q: "What is the basic functional unit of the kidney?", a: ["Nephron", "Loop of Henle", "Glomerulus", "Bowman's capsule"], c: 0 },
        { q: "Which nitrogenous waste is the most toxic?", a: ["Ammonia", "Urea", "Uric acid", "Nitrates"], c: 0 },
        { q: "Which structure is absent from reptilian nephrons?", a: ["Loop of Henle", "PCT", "Glomerulus", "DCT"], c: 0 },
        { q: "What is the Glomerular Filtration Rate (GFR)?", a: ["Amount of blood filtered by kidneys over time", "Number of glomeruli", "Amount of glucose reabsorbed", "Total blood volume"], c: 0 },
        { q: "The urinary bladder is lined with which cell type?", a: ["Transitional epithelial cells", "Cuboidal cells", "Smooth muscle", "Squamous cells"], c: 0 },
        { q: "Which hormone produced by the kidney is necessary for RBC production?", a: ["Erythropoietin (EPO)", "ADH", "Aldosterone", "Insulin"], c: 0 },
        { q: "Aldosterone causes the reabsorption of what in the DCT?", a: ["Sodium", "Potassium", "Urea", "Nitrogen"], c: 0 },
        { q: "The kidneys are located in which space?", a: ["Retroperitoneal space", "Thoracic cavity", "Caudal pelvis", "Scrotum"], c: 0 },
        { q: "Glucose and amino acids 'hitch a ride' back into the blood with which molecule?", a: ["Sodium", "Calcium", "Potassium", "Chloride"], c: 0 }
    ]
};

let currentSet = [];
let qIdx = 0;
let score = 0;
let missed = [];

function startQuiz(cat) {
    qIdx = 0; score = 0; missed = [];
    if(cat === 'all') {
        currentSet = [...bank.immune, ...bank.skin, ...bank.gi, ...bank.urinary];
    } else {
        currentSet = [...bank[cat]];
    }
    
    currentSet.sort(() => Math.random() - 0.5);
    document.getElementById("startMenu").style.display = "none";
    document.getElementById("quizBox").style.display = "block";
    document.getElementById("resultBox").style.display = "none";
    showQuestion();
}

function showQuestion() {
    const q = currentSet[qIdx];
    const box = document.getElementById("optionsBox");
    document.getElementById("qCount").textContent = `QUESTION ${qIdx + 1} OF ${currentSet.length}`;
    document.getElementById("progressInner").style.width = `${(qIdx / currentSet.length) * 100}%`;
    document.getElementById("questionText").textContent = q.q;
    document.getElementById("feedback").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    box.innerHTML = "";

    let opts = q.a.map((t, i) => ({ t, isCorrect: i === q.c }));
    opts.sort(() => Math.random() - 0.5);

    opts.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "btn btn-choice";
        btn.textContent = opt.t;
        btn.onclick = () => {
            const all = box.querySelectorAll(".btn");
            all.forEach(b => b.disabled = true);
            if(opt.isCorrect) {
                score++;
                btn.classList.add("correct");
                document.getElementById("feedback").textContent = "✨ Correct!";
                document.getElementById("feedback").style.backgroundColor = "#dcfce7";
                document.getElementById("feedback").style.color = "var(--success)";
            } else {
                btn.classList.add("wrong");
                missed.push({ q: q.q, a: q.a[q.c] });
                document.getElementById("feedback").textContent = `❌ Incorrect. Correct: ${q.a[q.c]}`;
                document.getElementById("feedback").style.backgroundColor = "#fee2e2";
                document.getElementById("feedback").style.color = "var(--error)";
                all.forEach(b => { if(b.textContent === q.a[q.c]) b.classList.add("correct"); });
            }
            document.getElementById("feedback").style.display = "block";
            document.getElementById("nextBtn").style.display = "block";
        };
        box.appendChild(btn);
    });
}

document.getElementById("nextBtn").onclick = () => {
    qIdx++;
    if(qIdx < currentSet.length) showQuestion();
    else showResults();
};

function showResults() {
    document.getElementById("quizBox").style.display = "none";
    document.getElementById("resultBox").style.display = "block";
    const pct = Math.round((score/currentSet.length)*100);
    document.getElementById("scoreBig").textContent = `${pct}%`;
    document.getElementById("scoreDetail").textContent = `You answered ${score} out of ${currentSet.length} correctly.`;
    const list = document.getElementById("reviewList");
    list.innerHTML = "";
    if(missed.length === 0) list.innerHTML = "<p>Perfect score! You've mastered these topics.</p>";
    missed.forEach(m => {
        const d = document.createElement("div");
        d.className = "review-item";
        d.innerHTML = `<strong>Q:</strong> ${m.q}<br><span style="color:var(--success)"><strong>Answer:</strong> ${m.a}</span>`;
        list.appendChild(d);
    });
}

function goHome() {
    document.getElementById("resultBox").style.display = "none";
    document.getElementById("startMenu").style.display = "block";
}
</script>
</body>
</html>
