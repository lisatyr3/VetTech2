<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vet Tech Mastery - Updated</title>

<style>
:root {
  --primary: #2563eb;
  --success: #16a34a;
  --error: #dc2626;
  --bg: #f8fafc;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
  line-height: 1.5;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

.btn {
  padding: 12px;
  margin: 8px 0;
  width: 100%;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: opacity 0.2s;
}

.btn:disabled { opacity: 0.7; cursor: not-allowed; }

.btn-choice { 
    background: #f1f5f9; 
    text-align: left;
    font-weight: normal;
}
.btn-choice:hover:not(:disabled) { background: #e2e8f0; }

.btn-primary { background: var(--primary); color: white; }

.correct { background: #dcfce7 !important; border: 2px solid var(--success); }
.wrong { background: #fee2e2 !important; border: 2px solid var(--error); }

.progress-bar {
  height: 8px;
  background: #e2e8f0;
  margin-bottom: 20px;
  border-radius: 4px;
  overflow: hidden;
}

#progressInner {
  height: 100%;
  width: 0%;
  background: var(--primary);
  transition: width 0.3s ease;
}

#feedback {
  font-weight: bold;
  margin: 15px 0;
  min-height: 1.5em;
}

.review-item {
    margin-bottom: 15px;
    padding: 10px;
    border-bottom: 1px solid #e2e8f0;
}
</style>
</head>

<body>

<div class="card">
<div id="startMenu">
  <h2>Veterinary Technician Study Guide</h2>
  <p>Select a topic to begin:</p>
  <button class="btn btn-choice" onclick="startQuiz('immune')">🦠 Immune System</button>
  <button class="btn btn-choice" onclick="startQuiz('skin')">🛡️ Integumentary (Skin)</button>
  <button class="btn btn-choice" onclick="startQuiz('gi')">🧪 Gastrointestinal</button>
  <button class="btn btn-choice" onclick="startQuiz('urinary')">💧 Urinary System</button>
  <button class="btn btn-primary" onclick="startQuiz('all')">🔥 FINAL EXAM (All Topics)</button>
</div>

<div id="quizBox" style="display:none;">
  <div class="progress-bar"><div id="progressInner"></div></div>
  <div id="qCount" style="font-size: 0.9em; color: #64748b;"></div>
  <h3 id="questionText"></h3>
  <div id="optionsBox"></div>
  <div id="feedback"></div>
  <button id="nextBtn" class="btn btn-primary">Next Question</button>
  <button class="btn btn-choice" style="margin-top:20px; text-align:center" onclick="goHome()">🏠 Quit to Home</button>
</div>

<div id="resultBox" style="display:none;">
  <h2 id="scoreBig"></h2>
  <p id="scoreDetail"></p>
  <div id="reviewSection">
    <h3>Review Missed Questions:</h3>
    <div id="reviewList"></div>
  </div>
  <button class="btn btn-primary" onclick="goHome()">🏠 Back to Menu</button>
</div>
</div>

};

let currentSet = [];
let qIdx = 0;
let score = 0;
let missed = [];

function startQuiz(cat) {
  qIdx = 0;
  score = 0;
  missed = [];

  if(cat === "all") {
    currentSet = [...bank.skin, ...bank.gi, ...bank.immune, ...bank.urinary];
  } else {
    currentSet = [...bank[cat]];
  }

  // Shuffle questions
  currentSet.sort(() => Math.random() - 0.5);

  document.getElementById("startMenu").style.display = "none";
  document.getElementById("quizBox").style.display = "block";
  document.getElementById("resultBox").style.display = "none";

  showQuestion();
}

function showQuestion() {
  const q = currentSet[qIdx];
  const box = document.getElementById("optionsBox");
  
  document.getElementById("qCount").textContent = `Question ${qIdx + 1} of ${currentSet.length}`;
  document.getElementById("progressInner").style.width = `${(qIdx / currentSet.length) * 100}%`;
  document.getElementById("questionText").textContent = q.q;
  
  box.innerHTML = "";
  document.getElementById("feedback").textContent = "";
  document.getElementById("nextBtn").style.display = "none";

  // Create option buttons
  let opts = q.a.map((text, index) => ({ text, isCorrect: index === q.c }));
  
  // Shuffle options so "All of the above" isn't always 'a' if it was 1st in array
  // (Note: For some questions like T/F, you might want to skip shuffling)
  if(q.a.length > 2) opts.sort(() => Math.random() - 0.5);

  opts.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "btn btn-choice";
    btn.textContent = opt.text;

    btn.onclick = () => {
      const allBtns = box.querySelectorAll(".btn-choice");
      allBtns.forEach(b => b.disabled = true);

      if(opt.isCorrect) {
        score++;
        btn.classList.add("correct");
        document.getElementById("feedback").textContent = "✨ Correct!";
        document.getElementById("feedback").style.color = "var(--success)";
      } else {
        btn.classList.add("wrong");
        missed.push({ q: q.q, correct: q.a[q.c] });
        document.getElementById("feedback").textContent = `❌ Incorrect. Correct answer: ${q.a[q.c]}`;
        document.getElementById("feedback").style.color = "var(--error)";
        
        // Highlight the actual correct one too
        allBtns.forEach(b => {
            if(b.textContent === q.a[q.c]) b.classList.add("correct");
        });
      }
      document.getElementById("nextBtn").style.display = "block";
    };
    box.appendChild(btn);
  });
}

document.getElementById("nextBtn").onclick = () => {
  qIdx++;
  if(qIdx < currentSet.length) showQuestion();
  else showResults();
};

function showResults() {
  document.getElementById("quizBox").style.display = "none";
  document.getElementById("resultBox").style.display = "block";

  const pct = Math.round((score / currentSet.length) * 100);
  document.getElementById("scoreBig").textContent = `${pct}%`;
  document.getElementById("scoreDetail").textContent = `Score: ${score} / ${currentSet.length}`;

  const list = document.getElementById("reviewList");
  list.innerHTML = "";

  if(missed.length === 0) {
    list.innerHTML = "<p>Perfect score! You're ready for the exam! 🐾</p>";
  } else {
    missed.forEach(m => {
      const div = document.createElement("div");
      div.className = "review-item";
      div.innerHTML = `<strong>Q:</strong> ${m.q}<br><strong style="color:var(--success)">A:</strong> ${m.correct}`;
      list.appendChild(div);
    });
  }
}

function goHome() {
  document.getElementById("resultBox").style.display = "none";
  document.getElementById("quizBox").style.display = "none";
  document.getElementById("startMenu").style.display = "block";
}
</script>
</body>
</html>
