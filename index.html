<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vet Tech Mastery</title>

<style>
:root {
  --primary: #2563eb;
  --success: #16a34a;
  --error: #dc2626;
  --bg: #f8fafc;
}

body {
  font-family: system-ui;
  background: var(--bg);
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
}

.btn {
  padding: 12px;
  margin: 8px 0;
  width: 100%;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.btn-choice { background: #f1f5f9; }
.btn-primary { background: var(--primary); color: white; }

.correct { background: #dcfce7 !important; }
.wrong { background: #fee2e2 !important; }

.progress-bar {
  height: 8px;
  background: #e2e8f0;
  margin-bottom: 20px;
}

#progressInner {
  height: 100%;
  width: 0%;
  background: var(--primary);
}

#feedback {
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">

<div id="startMenu">
  <h2>Select Topic</h2>
  <button class="btn btn-choice" onclick="startQuiz('skin')">🛡️ Skin</button>
  <button class="btn btn-choice" onclick="startQuiz('gi')">🧪 GI</button>
  <button class="btn btn-choice" onclick="startQuiz('immune')">🦠 Immune</button>
  <button class="btn btn-primary" onclick="startQuiz('all')">🔥 FINAL EXAM</button>
</div>

<div id="quizBox" style="display:none;">
  <div class="progress-bar"><div id="progressInner"></div></div>
  <div id="qCount"></div>
  <h3 id="questionText"></h3>
  <div id="optionsBox"></div>
  <div id="feedback"></div>
  <button id="nextBtn" class="btn btn-primary">Next</button>
  <button class="btn btn-primary" onclick="goHome()">🏠 Home</button>
</div>

<div id="resultBox" style="display:none;">
  <h2 id="scoreBig"></h2>
  <p id="scoreDetail"></p>

  <h3>Review Missed:</h3>
  <div id="reviewList"></div>

  <button class="btn btn-primary" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>
const bank = {
  skin: [
    { q: "Regarding vitamin D synthesis, which statement is CORRECT?", a: ["Sunlight triggers conversion in the skin.", "Hypodermis only", "Diet only", "Sebaceous glands"], c: 0 },
    { q: "Keratin appendage?", a: ["Horns", "Dermis", "Glands", "Cells"], c: 0 }
  ],
  gi: [
    { q: "Na/K ratio?", a: ["3/2", "2/3", "1/1", "Reverse"], c: 0 },
    { q: "Obligate carnivore?", a: ["Cat", "Dog", "Horse", "Pig"], c: 0 }
  ],
  immune: [
    { q: "First responder?", a: ["Neutrophil", "RBC", "Platelet", "Neuron"], c: 0 },
    { q: "First antibody?", a: ["IgM", "IgG", "IgE", "IgA"], c: 0 }
  ]
};

let currentSet = [];
let qIdx = 0;
let score = 0;
let missed = [];

// Attach NEXT button once (important)
document.getElementById("nextBtn").onclick = handleNext;

function startQuiz(cat) {
  qIdx = 0;
  score = 0;
  missed = [];

  if(cat === "all") currentSet = [...bank.skin, ...bank.gi, ...bank.immune];
  else currentSet = [...bank[cat]];

  currentSet.sort(() => Math.random() - 0.5);

  document.getElementById("startMenu").style.display = "none";
  document.getElementById("quizBox").style.display = "block";
  document.getElementById("resultBox").style.display = "none";

  showQuestion();
}

function showQuestion() {
  const q = currentSet[qIdx];

  document.getElementById("qCount").textContent =
    `Question ${qIdx+1} of ${currentSet.length}`;

  document.getElementById("progressInner").style.width =
    `${(qIdx/currentSet.length)*100}%`;

  document.getElementById("questionText").textContent = q.q;

  const box = document.getElementById("optionsBox");
  box.innerHTML = "";

  document.getElementById("feedback").textContent = "";
  document.getElementById("nextBtn").disabled = true;

  let opts = q.a.map((t,i)=>({t,correct:i===q.c}));
  opts.sort(()=>Math.random()-0.5);

  opts.forEach(opt=>{
    const btn = document.createElement("button");
    btn.className = "btn btn-choice";
    btn.textContent = opt.t;

    btn.onclick = () => {
      document.querySelectorAll(".btn-choice").forEach(b=>{
        b.disabled = true;
        if(b.textContent === q.a[q.c]) b.classList.add("correct");
      });

      if(opt.correct){
        score++;
        document.getElementById("feedback").textContent = "✅ Correct!";
        document.getElementById("feedback").style.color = "green";
      } else {
        btn.classList.add("wrong");
        missed.push({q:q.q,a:q.a[q.c]});
        document.getElementById("feedback").textContent = "❌ Incorrect";
        document.getElementById("feedback").style.color = "red";
      }

      document.getElementById("nextBtn").disabled = false;
    };

    box.appendChild(btn);
  });
}

function handleNext() {
  qIdx++;
  if(qIdx < currentSet.length) showQuestion();
  else showResults();
}

function showResults() {
  document.getElementById("quizBox").style.display = "none";
  document.getElementById("resultBox").style.display = "block";

  const pct = Math.round((score/currentSet.length)*100);

  document.getElementById("scoreBig").textContent = pct + "%";
  document.getElementById("scoreDetail").textContent =
    `You got ${score} out of ${currentSet.length}`;

  const list = document.getElementById("reviewList");
  list.innerHTML = "";

  missed.forEach(m=>{
    const d = document.createElement("div");
    d.innerHTML = `<strong>Q:</strong> ${m.q}<br><strong>A:</strong> ${m.a}`;
    list.appendChild(d);
  });
}

function goHome() {
  qIdx = 0;
  score = 0;
  missed = [];
  currentSet = [];

  document.getElementById("quizBox").style.display = "none";
  document.getElementById("resultBox").style.display = "none";
  document.getElementById("startMenu").style.display = "block";

  document.getElementById("progressInner").style.width = "0%";
  document.getElementById("optionsBox").innerHTML = "";
  document.getElementById("questionText").textContent = "";
  document.getElementById("feedback").textContent = "";
  document.getElementById("qCount").textContent = "";
}
</script>

</body>
</html>
